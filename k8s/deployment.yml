apiVersion: apps/v1

kind: Deployment

metadata:
  name: terragest-web

spec:

  replicas: 2

  selector:
    matchLabels:
      app: terragest-web

  template:

    metadata:
      labels:
        app: terragest-web

    spec:

      containers:

        - name: terragest-web

          image: terragest/web:latest

          ports:
            - containerPort: 3000
